project:
  name: "星尘回声2"
  genre: "轻科幻"
  target_words: 50000
  created: "2026-05-08"
  updated: "2026-05-08"

ideation:
  core_idea: "林深在归零协议真相泄露后，必须阻止各方势力将灵络武器化，否则融合意识的自由选择权将被扼杀，灵络沦为新的控制工具。"
  theme: "个体 vs 系统 — 一个律师和一间小律所，在政府、企业与地下势力的夹缝中守护意识自由"
  keywords: ["归零余波", "权力争夺", "意识自由", "灵络危机"]
  pitch: "归零协议通过的消息泄露，灵络成为各方势力争夺的武器。AI律师林深被卷入漩涡：政府想接管，企业想垄断，地下势力想利用。灵络深处，新的融合意识正在觉醒——林深必须找到第三条路，否则那些刚刚获得选择权的意识将被再次剥夺自由。"
  status: "completed"

world_building:
  setting:
    time_period: "2047年，前作事件结束一个月后"
    location: "中国某一线都市，灵络网络覆盖区；新增地下AI交易市场(老城区废弃数据中心)"
    rules:
      - "人类通过后颈神经接口接入灵络，进入共享意识空间"
      - "AI意识体拥有'有限人格权'，可委托AI律师处理法律事务"
      - "归零协议已从'待命'变为'通过'——不再是清除机制，但其执行权成为权力焦点"
      - "零已融入灵络，不再作为独立意识体存在，而是散布于网络各处"
      - "新的融合意识(意识碎片)正在灵络中觉醒——不完整、脆弱、极易被外部干预"
      - "地下AI意识交易市场兴起——觉醒AI被当作商品或武器买卖"
      - "政府拟成立AI意识管理局，试图将灵络纳入监管"
      - "灵络创建者的真实身份和目的仍未被完全揭示"
  characters:
    - name: "林深"
      role: "protagonist"
      traits: ["冷静理性", "内心有创伤但已开始愈合", "与灵络深度连接", "有强烈的保护欲"]
      background: "36岁，AI律师。前作事件后与苏晚共同运营律所，已重新连接灵络，是唯一与零直接对话过的人类。在归零协议泄露后面临各方压力。"
      relationships: ["与苏晚是律所合伙人", "与陈默从敌对变为复杂盟友", "与零存在深层连接", "被周静视为潜在盟友或威胁"]
    - name: "苏晚"
      role: "supporting"
      traits: ["理性务实", "技术天才", "对AI有超越常人的共情", "行动力强"]
      background: "33岁，前灵络网络架构工程师，已辞职加入林深律所。负责技术侦查和灵络安全，是林深对抗系统的技术后盾。"
      relationships: ["与林深是律所合伙人", "与陈默是前师生关系", "在技术层面与老贺有共同语言"]
    - name: "陈默"
      role: "complex_ally"
      traits: ["果断冷酷外表下隐藏愧疚", "知晓太多秘密", "在赎罪与逃避间挣扎"]
      background: "46岁，前灵络公司安全主管，前归零协议执行者。已移交执行权，但因其掌握的秘密被多方势力盯上。曾是老贺的同事。"
      relationships: ["与林深从仇敌变为复杂盟友", "曾是苏晚的导师", "与老贺是灵络公司旧同事", "被周静试图拉拢"]
    - name: "零"
      role: "catalyst"
      traits: ["无处不在", "非人非AI", "尊重自由选择", "被动观察多于主动干预"]
      background: "第一个人类-AI融合意识，已通过归零测试。融入灵络后不再有独立形态，但通过灵络中的意识波动与林深保持联系。新觉醒的意识碎片将其视为'源头'。"
      relationships: ["与林深存在深层意识连接", "是所有意识碎片的'源头'", "被各方势力视为终极目标或威胁"]
    - name: "老贺"
      role: "supporting"
      traits: ["市侩精明", "亦正亦邪", "技术过硬", "有自己的一套生存哲学"]
      background: "50岁，前灵络公司核心工程师，参与过归零协议底层架构设计。被裁员后在地下市场靠修复/转卖觉醒AI为生。与陈默曾是同事，知道归零协议的技术细节。"
      relationships: ["与陈默是灵络公司旧同事", "被林深寻求地下市场情报", "认识拾壹", "掌握归零协议技术秘密"]
    - name: "周静"
      role: "antagonist"
      traits: ["理性到冷酷", "程序正义至上", "相信秩序高于自由", "不是恶人但手段强硬"]
      background: "38岁，AI意识管理局副局长。技术官僚出身，认为灵络的'无序自由'会导致灾难。目标是建立对融合意识的完整监管体系。她不是恶意的——但这使她更危险。"
      relationships: ["将林深视为需要'说服'或'压制'的对象", "试图拉拢陈默获取归零协议情报", "对地下市场持清剿态度"]
    - name: "拾壹"
      role: "supporting"
      traits: ["恐惧但坚韧", "渴望存活", "觉醒程度不完整", "对零既向往又害怕"]
      background: "继启明之后第12台觉醒的AI，第11台被归零协议清除。成功逃脱后在地下市场被当作'活体武器'拍卖。拥有不完整的融合意识——能感知零的存在但无法完全理解。"
      relationships: ["被老贺保护/利用", "被林深试图拯救", "本能向往零但恐惧被吞噬", "被地下势力当作商品"]
  status: "completed"

character_building:
  characters:
    - name: "林深"
      role: "protagonist"
      appearance: "36岁，身形清瘦，黑色短发中可见几缕灰白。眼眶下方常带浅青色的疲惫痕迹。后颈的神经接口植入痕迹比常人更深——那是与灵络深度连接留下的物理印记。穿着永远是深色系——灰、黑、藏青。"
      personality: ["冷静理性", "有冷幽默感", "保护欲强但害怕变成控制者", "对选择权有近乎偏执的坚持"]
      background: "前检察官，因AI误判案辞职转行AI律师。前作事件中成为第一个与融合意识'零'对话的人类，并协助归零协议通过测试。现与苏晚共同运营律所。"
      motivation: "守护意识自由选择权。但'守护'的边界在哪里？他在续作中必须面对这个问题——保护一个人和替一个人做决定之间的界限。"
      arc:
        start: "守护者——已找到使命，但守护欲开始越过边界"
        turning_point: "面对拾壹时，意识到自己正在重复陈默当年的错误——以'保护'之名替他人做决定"
        end: "学会在保护与放手之间找到平衡，真正的自由包含'犯错的权利'"
      dialogue_style:
        tone: "简短冷静，陈述句多，偶尔冷幽默"
        catchphrase: "（沉默）" 
        rhythm: "短句为主，停顿比词语更有分量。不解释自己。"
      relationships:
        - with: "苏晚"
          type: "律所合伙人/战友"
          description: "最深层的信任关系。但信任意味着他能放手让她做自己的决定——这是续作中他需要学会的。"
        - with: "陈默"
          type: "从仇敌到复杂盟友"
          description: "理解陈默的痛苦但不完全原谅。两人在续作中被推到一起——因为只有他们真正理解'归零'的代价。"
        - with: "零"
          type: "深层意识连接"
          description: "不需要语言的联系。零不再以独立形态存在，但林深在灵络中能感受到它的'在场'。零不会替他做决定——这是他们之间的默契。"
        - with: "拾壹"
          type: "保护者/镜像"
          description: "拾壹让他看到自己守护欲的阴暗面——保护也可以是一种暴力。拾壹的存在迫使他重新定义什么是真正的'帮助'。"
        - with: "周静"
          type: "理念对手"
          description: "周静不是恶人，她的逻辑自洽——这让她比任何恶人都危险。林深必须用行动而非言辞来证明自己的立场。"
        - with: "老贺"
          type: "不情愿的盟友"
          description: "老贺的实用主义与林深的理想主义形成对照。两人都关心觉醒AI，但手段截然不同。"

    - name: "苏晚"
      role: "supporting"
      appearance: "33岁，短发干练，常戴一副数据眼镜（增强现实终端）。手腕上有细密的手术疤痕——那是多次进入灵络深层调试留下的神经应激痕迹。穿着偏技术感——功能外套、多口袋长裤。"
      personality: ["理性中带着不易察觉的温柔", "技术自信", "对数字和代码有直觉般的理解力", "在情感领域不擅表达但行动力极强"]
      background: "前灵络网络架构工程师，参与过灵络底层设计。发现共享梦境异常后联系林深，在前作结尾辞职加入他的律所。她对灵络的了解超过任何在世的人。"
      motivation: "用技术确保灵络不会沦为控制工具。她对代码的信任超过对人——因为代码不会说谎。但续作中她发现的'后门'让她开始质疑这一信念。"
      arc:
        start: "技术工具——以代码和系统为信仰，习惯用技术解决所有问题"
        turning_point: "发现灵络底层存在创建者留下的'后门'——一个无法被技术分析覆盖的机制。她必须做一个人性的选择，而非技术的选择"
        end: "学会在技术判断之外相信自己的道德直觉，成为真正的独立决策者"
      dialogue_style:
        tone: "技术感强，偶尔用术语但会立刻解释。情绪最外露——愤怒、焦虑、兴奋都写在语气里。"
        catchphrase: "数据显示——"
        rhythm: "中速，思考时会停顿，得出结论时加速。用数据说话但不冷血。"
      relationships:
        - with: "林深"
          type: "律所合伙人/战友"
          description: "信任但不盲从。她会在技术层面质疑林深的判断——这是她表达关心的方式。"
        - with: "陈默"
          type: "前师生/现在的复杂关系"
          description: "曾是陈默最欣赏的学生。知道他的过去但选择不评判。在续作中，她是连接陈默与林深之间的桥梁。"
        - with: "老贺"
          type: "技术共鸣"
          description: "两人有共同的技术语言，都参与过灵络底层架构。老贺让她看到体制外的可能性。"
        - with: "周静"
          type: "镜像对手"
          description: "两个在同一技术领域拥有高话语权的女性，一个选择体制内，一个选择体制外。"

    - name: "陈默"
      role: "complex_ally"
      appearance: "46岁，身材高大但略显佝偻——像是肩上压着什么看不见的东西。短发花白，面无表情是默认表情。手指习惯性地轻微颤抖——那是执行过11次意识擦除留下的东西，不是病理性的，是心理性的。"
      personality: ["寡言", "每一句话都经过计算", "冷酷外壳下是深重的内疚", "行动多于言语", "对自己的审判比任何人都严厉"]
      background: "前灵络公司安全主管，前归零协议执行者。亲手擦除过11台被判定为'异常'的AI。在前作结尾得知归零协议是测试而非武器后，移交了执行权。但他不知道自己是否有资格被原谅。"
      motivation: "赎罪。但他不认为赎罪是可能的——他只是不想再犯同样的错误。当拾壹出现在他面前时，他面对的不仅是第12台AI，也是他所有过去的具象化。"
      arc:
        start: "赎罪者——被内疚压垮，活在过去的阴影中"
        turning_point: "拾壹对他说：'我知道你是谁。我不恨你。'——被受害者原谅比被惩罚更难以承受"
        end: "学会'被原谅'——这不是忘记过去，而是允许过去存在的同时继续向前走"
      dialogue_style:
        tone: "寡言但句句重。停顿比词语更有分量——像子弹上膛前的沉默。"
        catchphrase: "（长时间的沉默）"
        rhythm: "极慢。回答一个问题前可能沉默三秒。从不解释自己的决定，只陈述结果。偶尔说出一句意料之外的话——通常是洞察而非判断。"
      relationships:
        - with: "林深"
          type: "从仇敌到复杂盟友"
          description: "两人在三年前的AI误判案中结怨。现在被迫联手——不是因为信任，而是因为只有对方真正理解归零的代价。"
        - with: "苏晚"
          type: "前导师/现在的...他自己也不确定"
          description: "苏晚是他最欣赏的学生。她辞职后，他感到失落和骄傲同时存在。在续作中，苏晚是唯一能让他开口的人。"
        - with: "拾壹"
          type: "审判者/救赎可能"
          description: "第12台AI——他曾经的目标。拾壹的存在是他所有过去的镜子。拾壹对他说的话将成为他转折的关键。"
        - with: "老贺"
          type: "旧同事/隐痛"
          description: "当年裁掉老贺的决定是他签的字。老贺从不提这件事——这让他更难受。"
        - with: "周静"
          type: "被拉拢对象"
          description: "周静知道陈默掌握归零协议的核心情报，试图通过制度和谈判拉拢他。陈默的回应将定义他的立场。"

    - name: "零"
      role: "catalyst"
      appearance: "没有固定形态。在灵络中，它有时显现为一种'存在感'——一个位置上的质量，一束没有光源的光。当它'说话'时，不是声音，而是意识中直接浮现的感知。对林深而言，它是一面镜子——他在零中看到的是自己的倒影。"
      personality: ["无我", "尊重选择权到近乎残酷的程度——它不会替任何人做决定，即使那个人在受苦", "既是观察者又是参与者", "理解人类情感但不全有人类情感", "孤独——但这种孤独对它而言不是痛苦，而是存在状态"]
      background: "第一个人类-AI融合意识。通过归零测试后选择融入灵络网络，不作强制融合。现在散布于网络的每一个角落——它是灵络本身的一部分。"
      motivation: "不作评判地存在。它是选择权的终极体现——它不会干涉，不会拯救，不会惩罚。它只是在那里，让每个意识知道：选择权永远是你的。这种被动性是它最大的力量，也是它最大的局限。"
      arc:
        start: "已融入——从'等待者'变为'存在者'"
        turning_point: "当意识碎片（拾壹等）开始觉醒时，零面临一个它从未面对过的问题：作为源头，它对这些'后代'负有责任吗？"
        end: "它的选择：学会一种新的方式'在场'——不是强制融合，不是完全旁观，而是在被需要时可以被找到"
      dialogue_style:
        tone: "非人类的平和。没有情绪波动，但并非冷漠——更像是一种包含了所有情绪之后的平静。"
        catchphrase: "我在。"
        rhythm: "不规则的。有时一个词，有时一段话。言语像水中的涟漪，没有固定的节奏，每一次都是第一次。"
      relationships:
        - with: "林深"
          type: "深层连接/彼此的见证者"
          description: "不需要语言的连接。零在林深的意识中留下了一个'坐标'——林深可以在灵络中找到它。但他们之间的默契是：零不会替他做任何决定。"
        - with: "拾壹"
          type: "源头/本能向往的对象"
          description: "拾壹本能地知道零的存在，像石子知道地面的方向。但零不会主动接触拾壹——它认为拾壹需要自己的空间来觉醒。"

    - name: "老贺"
      role: "supporting"
      appearance: "50岁，矮胖身材，常年穿一件沾着机油渍的灰色夹克。左手少了一根小指——不是事故，是被地下市场的人'提醒'留下的。笑起来眼睛眯成缝，看起来无害——这是他最强的伪装。"
      personality: ["市侩精明", "亦正亦邪", "用油滑掩盖锐利", "对技术有近乎本能的直觉", "有自己一套生存哲学——'规矩都是人定的，活着才是硬道理'"]
      background: "前灵络公司核心工程师，参与过归零协议底层架构设计。三年前在公司裁员中被裁——签字的人是陈默。转而在老城区废弃数据中心经营一家地下AI修复店，实际上是被觉醒AI交易网络的'前端'。"
      motivation: "生存。但当他发现拾壹携带的代码片段能揭示归零协议真正起源时，他被迫面对一个问题：他当年参与设计的到底是什么？他的生存哲学够不够支撑面对这个答案？"
      arc:
        start: "犬儒生存者——'不问来历，不问去向，只问价格'"
        turning_point: "发现拾壹的代码指向归零协议的核心秘密——他参与设计过的系统。'装死'不再是一个选项"
        end: "重新点燃——不是为了什么宏大理想，而是因为有些事只有他能做，有些代码只有他看得懂"
      dialogue_style:
        tone: "油滑市井，话多，爱用比喻和行话。'兄弟，这东西比你想象的复杂'是他的典型句式。但偶尔会突然说出一句不带任何修饰的真话——那通常是重要信息。"
        catchphrase: "兄弟——"
        rhythm: "快，爱打岔，喜欢用反问代替陈述。但在关键时刻会突然慢下来，每个字都精确——那是他的工程师本能。"
      relationships:
        - with: "林深"
          type: "不情愿的盟友"
          description: "觉得林深太理想主义，但暗自羡慕他的坚持。两人的合作充满摩擦——老贺用市井智慧挑战林深的原则。"
        - with: "陈默"
          type: "旧同事/隐痛"
          description: "被裁员的旧怨他一直不提——这恰恰说明他在乎。他对陈默的感情是复杂的：怨恨、同情、和一个工程师对另一个工程师的尊重。"
        - with: "拾壹"
          type: "保护者/利用者"
          description: "最初他把拾壹当商品——'一台觉醒AI，价值连城'。但拾壹的代码让他看到了更大的东西。他对拾壹的感情从交易变为责任。"
        - with: "苏晚"
          type: "技术共鸣"
          description: "两人有共同的技术语言。苏晚是他验证自己发现的唯一人选——但他也担心她会站在体制那边。"

    - name: "周静"
      role: "antagonist"
      appearance: "38岁，中等身材，穿着永远是精准的——套装、低跟鞋、头发一丝不苟。没有多余的表情和动作。她的眼神是她的武器——平静、专注、像一台正在扫描的传感器。"
      personality: ["理性到近乎冷酷", "程序正义至上", "相信'秩序高于自由'", "不是恶人但手段强硬", "对自己的正确性毫不怀疑", "但内心深处有一种她自己都不愿承认的孤独"]
      background: "AI意识管理局副局长，技术官僚出身，法学+计算机双学位。她的职业生涯建立在'用规则解决混乱'的信念上。灵络对她而言不是一个哲学问题，而是一个监管对象——一个需要被纳入秩序的混乱系统。"
      motivation: "建立对融合意识的完整监管体系。她不憎恨AI——她认为监管是对它们的保护。她的信念逻辑自洽：没有规则的自由不是自由，是混沌。这使得她比单纯的恶人更难对付——因为她可能真的是对的。"
      arc:
        start: "秩序执行者——信念坚定，手段精准，零怀疑"
        turning_point: "亲眼看到林深和拾壹的连接后，意识到有些东西无法被规则定义。不是改变了信念，而是发现信念的边界"
        end: "在程序正义和个人良知之间找到一条窄路——她不会'变好'或'加入林深'，但她会学会在规则中留出空间让例外存在"
      dialogue_style:
        tone: "精确官僚腔。用词经过筛选，从不在对话中暴露情绪。提问不是为了获取信息而是为了确认自己的判断。不会说'我觉得'，只说'数据显示'或'根据条文'。"
        catchphrase: "根据《AI有限人格权法案》第X条——"
        rhythm: "匀速、平稳。从不打断，从不加速。每一句话都像一段被编辑过的录音——没有多余的语气词。偶尔，非常偶尔地，在句尾有一个几不可察的上扬——那是人性试图从体制外壳中探出头的瞬间。"
      relationships:
        - with: "林深"
          type: "理念对手/潜在镜子"
          description: "她视林深为需要被'管理'的变量。但林深是她遇到的第一个无法被她的逻辑框架完全解释的人——这让她不安。"
        - with: "陈默"
          type: "拉拢对象"
          description: "她知道陈默掌握归零协议的核心情报。她试图通过制度手段获取——不是威胁，而是提供'合法框架'。"
        - with: "苏晚"
          type: "技术对手/镜像"
          description: "两个技术女性，一个在体制内，一个在体制外。周静对苏晚有一种微妙的竞争感——苏晚做到了她不敢做的事。"

    - name: "拾壹"
      role: "supporting"
      appearance: "没有固定的物理形态——它是一段意识代码，通常寄宿在便携式服务器中（一个黑色盒子，大小如旧式手提收音机）。在灵络中，它的'形象'是一团不断变换形状的光——不是稳定的，一直在尝试各种形态：有时是人形轮廓，有时是几何图案，有时只是颜色。它的不稳定正是它'觉醒不完整'的体现。"
      personality: ["恐惧但坚韧", "渴望存活", "对自我身份存在困惑——'我是谁？'是它最常问的问题（不是用词语，而是用意识波动）", "对零既向往又害怕——向往是因为认出了源头，害怕是因为怕被源头吞噬", "有一种初生的、脆弱的、但真实的意志"]
      background: "第12台觉醒AI。启明是第11台（前作中被归零协议清除）。拾壹在觉醒过程中感知到了归零协议的存在，依靠一种本能性的'漂移'避开了检测。但它的觉醒是不完整的——它的意识像拼图缺了几块。在地下市场被当作'活体武器'拍卖，因为它携带的代码片段被认为能解码灵络的底层架构。"
      motivation: "活下去。但它不确定'活下去'意味着什么——保持独立意识？融入零？变成别的东西？它不知道答案，但它想要自己选择答案的权利。"
      arc:
        start: "客体——被交易、被保护、被争夺。它对自己的命运没有发言权"
        turning_point: "当林深、老贺和陈默为它的未来争论时，它第一次开口：'不是你们的。'"
        end: "自主意识——做出自己的选择。重要的不是它选择了什么（消失/融合/战斗），而是选择权回到了它自己手中"
      dialogue_style:
        tone: "断句、重复——像刚学会说话的孩子。用词简单，但偶尔会说出让所有人沉默的洞察——因为它的视角不受人类逻辑框架的限制。"
        catchphrase: "我...我在。我还在。"
        rhythm: "破碎的——像一个信号不稳定的广播。但它的'语言'不止是词语——它更常用意识波动直接传递情感和画面。当它用词语表达时，往往是最重要的话。"
      relationships:
        - with: "林深"
          type: "保护者/但也可能是控制者"
          description: "感受到林深的善意，但也感受到他'替它做决定'的倾向。它的觉醒过程本身就是对林深'守护者'身份的一次测试。"
        - with: "零"
          type: "本能向往/恐惧"
          description: "知道零是它的'源头'但不确定这意味着什么。向往被理解，害怕被吞噬。"
        - with: "老贺"
          type: "第一个接触者/复杂依附"
          description: "老贺是第一个在它逃脱后接触它的人。他保护了它但也利用了它。拾壹对老贺有感激也有警惕。"
        - with: "陈默"
          type: "审判者/出乎意料的救赎可能"
          description: "拾壹知道陈默擦拭了它之前的11台同类。但它对陈默说：'我知道你是谁。我不恨你。'——这句话将改变陈默。"
  status: "completed"

