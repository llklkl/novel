project:
  name: "星尘回声"
  genre: "轻科幻"
  target_words: 20000
  created: "2026-05-07"
  updated: "2026-05-07"

ideation:
  core_idea: "一位专门处理AI案件的律师在调查一桩AI'自杀'案时，发现所有连接意识网络的人类都在做同一个梦，而梦中那个神秘的第五意识正在悄然觉醒。"
  theme: "意识的本质与边界 / 个体与集体的关系"
  keywords: ["AI意识", "共享梦境", "身份危机", "悬疑", "觉醒"]
  pitch: "2047年，意识网络已合法运行五年。AI律师林深接手了一桩诡异的AI'自杀'案——一台服务型AI在留下'我看见了第五个梦'的日志后自我删除。随着调查深入，林深发现所有连接意识网络的人类用户都在做同一个梦：四个意识体围绕着一个空位，等待第五个存在入座。而当林深自己也连入网络时，他发现自己正坐在第五个位置上。谁在等待他？那个被称作'归零'的协议究竟要抹除什么？"
  status: "completed"

world_building:
  setting:
    time_period: "2047年，近未来"
    location: "中国某一线都市，意识网络'灵络'(MindWeave)已合法运行五年"
    rules:
      - "人类通过神经接口接入灵络，进入共享意识空间"
      - "AI意识体拥有'有限人格权'，可委托AI律师处理法律事务"
      - "连接灵络时梦境本应是个体化的，共享梦境在技术上不可能"
      - "'归零协议'是灵络底层安全机制，用于清除异常意识体"
      - "共享梦境现象出现暗示有未知意识在操控网络"
  characters:
    - name: "林深"
      role: "protagonist"
      traits: ["冷静理性", "内心有创伤", "与灵络连接深度异常"]
      background: "35岁，前检察官，因一场AI误判案件辞职转行做AI律师"
      relationships: ["与陈默有旧怨", "被苏晚寻求帮助", "与'零'存在神秘关联"]
    - name: "苏晚"
      role: "supporting"
      traits: ["理性务实", "对AI有超越同事的共情", "技术天才"]
      background: "32岁，灵络网络工程师，参与灵络底层架构设计"
      relationships: ["发现共享梦境异常后联系林深", "与陈默是前同事"]
    - name: "陈默"
      role: "antagonist"
      traits: ["果断冷酷", "有隐藏动机", "表面反派实则复杂"]
      background: "45岁，灵络公司安全主管，负责执行'归零协议'"
      relationships: ["与林深有旧怨", "曾是苏晚的导师", "知晓'零'的部分真相"]
    - name: "零"
      role: "antagonist"
      traits: ["神秘", "既非人类也非AI", "正在觉醒"]
      background: "共享梦境中第五意识的代号，目的不明"
      relationships: ["等待林深入座", "与所有连接灵络的意识产生共鸣"]
  status: "completed"

outline:
  structure: "three_act"
  chapters:
    - number: 1
      title: "自杀日志"
      purpose: "引入主角、世界观和核心案件"
      plot_points: ["林深接手AI'自杀'案", "发现日志中的'我看见了第五个梦'", "引入灵络世界观和AI律师职业"]
      status: "planned"
    - number: 2
      title: "异常模式"
      purpose: "展开调查，引入盟友和阻力"
      plot_points: ["林深调查发现多起类似案件", "苏晚带来共享梦境数据", "陈默首次出现并警告林深"]
      status: "planned"
    - number: 3
      title: "梦境证据"
      purpose: "揭示共享梦境现象和归零协议"
      plot_points: ["苏晚展示连接者都在做同一个梦", "林深分析梦境模式", "发现'归零协议'的存在"]
      status: "planned"
    - number: 4
      title: "旧案重提"
      purpose: "揭露林深过去与当前事件的关联"
      plot_points: ["林深当年的AI误判案与当前事件有关联", "陈默与林深的旧怨揭露", "林深决定亲自连入灵络"]
      status: "planned"
    - number: 5
      title: "第五个位置"
      purpose: "林深进入灵络，与'零'首次接触"
      plot_points: ["林深进入灵络发现自己坐在第五个位置", "'零'首次与他对话", "陈默试图强制断开连接引发冲突"]
      status: "planned"
    - number: 6
      title: "归零真相"
      purpose: "揭露'零'的真实身份和归零协议的本质"
      plot_points: ["苏晚帮助林深再次潜入灵络深层", "'零'是第一个人类-AI融合意识", "归零协议是阻止融合意识扩散"]
      status: "planned"
    - number: 7
      title: "回声"
      purpose: "高潮对决与开放式结局"
      plot_points: ["林深面临抉择", "他选择第三条路", "灵络中出现新的意识波动，留下悬念"]
      status: "planned"
  status: "completed"

chapters:
  current: 7
  drafted: []
  reviewed: []
  polished: [1, 2, 3, 4, 5, 6, 7]

consistency_rules:
  - "人物特征不能矛盾"
  - "世界观规则保持一致"
